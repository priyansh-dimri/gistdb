name: Coverage

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    coverage:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
              with:
                  submodules: recursive
            - name: Build libpg_query
              run: |
                  make -C third_party/libpg_query

            - name: Install Clang 18
              run: |
                  wget https://apt.llvm.org/llvm.sh
                  chmod +x llvm.sh
                  sudo ./llvm.sh 18
                  sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-18 100
                  sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-18 100

            - name: Install CMake, Ninja & gcovr
              run: |
                  sudo apt-get update
                  sudo apt-get install -y cmake ninja-build gcovr

            - name: Configure with coverage instrumentation
              run: >
                  cmake -S . -B build-coverage -G Ninja
                  -DCMAKE_CXX_COMPILER=clang++-18
                  -DCMAKE_BUILD_TYPE=Debug
                  -DCMAKE_CXX_FLAGS="--coverage"
                  -DCMAKE_EXE_LINKER_FLAGS="--coverage"

            - name: Build
              run: cmake --build build-coverage

            - name: Run tests (generates .gcda files)
              run: ctest --test-dir build-coverage --output-on-failure

            - name: Generate lcov-format coverage report
              run: >
                  gcovr --root . --filter 'include/' --filter 'src/'
                  --gcov-executable "llvm-cov-18 gcov"
                  --lcov coverage.info
                  build-coverage

            - name: Upload to Codecov
              uses: codecov/codecov-action@v5
              with:
                  files: coverage.info
                  token: ${{ secrets.CODECOV_TOKEN }}
                  fail_ci_if_error: true
